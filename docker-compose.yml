version: '3.8'

services:
  # ================================
  # Next.js Frontend (Port 3000)
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: temanskripsi-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - temanskripsi
    restart: unless-stopped

  # ================================
  # Laravel Backend API (Port 8000)
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: temanskripsi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    env_file:
      - ./backend/.env
    networks:
      - temanskripsi
    restart: unless-stopped

networks:
  temanskripsi:
    driver: bridge

